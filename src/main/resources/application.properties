spring.application.name=replay-service
server.port=8085

# ===== Base de datos propia =====
spring.datasource.url=jdbc:postgresql://localhost:5433/replay_service
spring.datasource.username=postgres
spring.datasource.password=Calculadora2020
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ===== RabbitMQ =====
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# La cola es MÍA, el exchange lo comparto con Game Engine (el productor)
royalarena.events.exchange=royalarena.matches
royalarena.events.queue.replay-recorded=replay.recorded-queue
royalarena.events.routing-key.replay-recorded=replay.recorded

# ===== Retención =====
royalarena.replay.max-per-user=10