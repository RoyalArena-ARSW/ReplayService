spring.application.name=replay-service
server.port=8085

# ===== JPA (común, sin credenciales) =====
spring.jpa.hibernate.ddl-auto=update

# ===== RabbitMQ =====
spring.rabbitmq.host=${RABBITMQ_HOST:localhost}
spring.rabbitmq.port=${RABBITMQ_PORT:5672}
spring.rabbitmq.username=${RABBITMQ_USER:guest}
spring.rabbitmq.password=${RABBITMQ_PASS:guest}

# La cola es mía, el exchange lo comparto con Game Engine (el productor)
royalarena.events.exchange=royalarena.matches
royalarena.events.queue.replay-recorded=replay.recorded-queue
royalarena.events.routing-key.replay-recorded=replay.recorded

# ===== Retención =====
royalarena.replay.max-per-user=10

# ===== Logging =====
logging.level.edu.eci.arsw.RoyalArena=INFO